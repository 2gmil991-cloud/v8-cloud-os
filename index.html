<script>
// ============================================
// V8.3 UNIFIED KERNEL - SINGLE SOURCE OF TRUTH
// ============================================

// ---------- 1. Event Bus ----------
class V8EventBus {
    constructor() {
        this.events = new Map();
    }
    
    on(event, handler) {
        if (!this.events.has(event)) this.events.set(event, []);
        this.events.get(event).push(handler);
        return () => this.off(event, handler);
    }
    
    off(event, handler) {
        if (!this.events.has(event)) return;
        const handlers = this.events.get(event);
        const index = handlers.indexOf(handler);
        if (index !== -1) handlers.splice(index, 1);
    }
    
    emit(event, data) {
        if (!this.events.has(event)) return;
        this.events.get(event).forEach(handler => handler(data));
    }
    
    once(event, handler) {
        const wrapper = (data) => {
            handler(data);
            this.off(event, wrapper);
        };
        this.on(event, wrapper);
    }
}

// ---------- 2. Storage Manager (IndexedDB) ----------
class V8Storage {
    constructor() {
        this.db = null;
        this.ready = false;
        this.queue = [];
    }
    
    async init() {
        if (this.ready) return true;
        
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('v8_unified_db', 2);
            
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                this.db = request.result;
                this.ready = true;
                this.processQueue();
                resolve(true);
            };
            
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains('app_data')) {
                    db.createObjectStore('app_data', { keyPath: 'id' });
                }
                if (!db.objectStoreNames.contains('images')) {
                    db.createObjectStore('images', { keyPath: 'id', autoIncrement: true });
                }
                if (!db.objectStoreNames.contains('settings')) {
                    db.createObjectStore('settings', { keyPath: 'key' });
                }
                console.log('✅ IndexedDB stores created');
            };
        });
    }
    
    processQueue() {
        this.queue.forEach(task => task());
        this.queue = [];
    }
    
    async get(store, id) {
        if (!this.ready) {
            await this.init();
        }
        return new Promise((resolve, reject) => {
            const tx = this.db.transaction([store], 'readonly');
            const req = tx.objectStore(store).get(id);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }
    
    async set(store, data) {
        if (!this.ready) {
            await this.init();
        }
        return new Promise((resolve, reject) => {
            const tx = this.db.transaction([store], 'readwrite');
            const req = tx.objectStore(store).put(data);
            req.onsuccess = () => resolve(data);
            req.onerror = () => reject(req.error);
        });
    }
    
    async getAll(store) {
        if (!this.ready) await this.init();
        return new Promise((resolve, reject) => {
            const tx = this.db.transaction([store], 'readonly');
            const req = tx.objectStore(store).getAll();
            req.onsuccess = () => resolve(req.result || []);
            req.onerror = () => reject(req.error);
        });
    }
    
    async delete(store, id) {
        if (!this.ready) await this.init();
        return new Promise((resolve, reject) => {
            const tx = this.db.transaction([store], 'readwrite');
            const req = tx.objectStore(store).delete(id);
            req.onsuccess = () => resolve(true);
            req.onerror = () => reject(req.error);
        });
    }
}

// ---------- 3. App Registry (Single Source of Truth) ----------
class V8AppRegistry {
    constructor(eventBus) {
        this.eventBus = eventBus;
        this.apps = new Map();
        this.instances = new Map();
    }
    
    register(appId, config) {
        if (this.apps.has(appId)) {
            console.warn(`App ${appId} already registered`);
            return false;
        }
        
        this.apps.set(appId, {
            id: appId,
            name: config.name,
            icon: config.icon,
            component: config.component,
            initialState: config.initialState || {},
            permissions: config.permissions || ['read']
        });
        
        this.eventBus.emit('app:registered', { appId, name: config.name });
        console.log(`✅ App registered: ${config.name}`);
        return true;
    }
    
    getApp(appId) {
        return this.apps.get(appId);
    }
    
    getAllApps() {
        return Array.from(this.apps.values());
    }
    
    createInstance(appId, windowId, props = {}) {
        const app = this.apps.get(appId);
        if (!app || !app.component) {
            console.error(`App ${appId} has no component`);
            return null;
        }
        
        const instance = new app.component(windowId, props);
        instance.appId = appId;
        instance.windowId = windowId;
        this.instances.set(`${appId}_${windowId}`, instance);
        return instance;
    }
    
    getInstance(appId, windowId) {
        return this.instances.get(`${appId}_${windowId}`);
    }
    
    destroyInstance(appId, windowId) {
        const instance = this.instances.get(`${appId}_${windowId}`);
        if (instance && instance.destroy) {
            instance.destroy();
        }
        this.instances.delete(`${appId}_${windowId}`);
    }
}

// ---------- 4. Window Manager (Kernel Controlled) ----------
class V8WindowManager {
    constructor(eventBus, appRegistry) {
        this.eventBus = eventBus;
        this.appRegistry = appRegistry;
        this.windows = new Map();
        this.nextZIndex = 100;
        this.windowCounter = 0;
        this.activeDrag = null;
    }
    
    createWindow(appId, options = {}) {
        const app = this.appRegistry.getApp(appId);
        if (!app) {
            console.error(`App ${appId} not found`);
            return null;
        }
        
        const windowId = `win_${appId}_${++this.windowCounter}_${Date.now()}`;
        const windowConfig = {
            id: windowId,
            appId: appId,
            title: options.title || app.name,
            x: options.x || 50 + (this.windows.size * 20),
            y: options.y || 80 + (this.windows.size * 15),
            width: options.width || 420,
            height: options.height || 450,
            zIndex: this.nextZIndex++,
            isMinimized: false,
            element: null,
            contentElement: null,
            instance: null
        };
        
        // إنشاء مثيل التطبيق
        const instance = this.appRegistry.createInstance(appId, windowId, options.props || {});
        if (instance) {
            windowConfig.instance = instance;
        }
        
        this.windows.set(windowId, windowConfig);
        this.renderWindow(windowConfig);
        this.eventBus.emit('window:created', { windowId, appId });
        
        return windowId;
    }
    
    renderWindow(config) {
        const existing = document.getElementById(config.id);
        if (existing) existing.remove();
        
        const winHtml = `
            <div id="${config.id}" class="window" style="left:${config.x}px; top:${config.y}px; width:${config.width}px; min-height:${config.height}px; z-index:${config.zIndex}">
                <div class="window-header" onmousedown="v8WindowManager.startDrag(event, '${config.id}')" ontouchstart="v8WindowManager.startDrag(event, '${config.id}')">
                    <div class="window-title">
                        <span>${config.title}</span>
                    </div>
                    <div class="window-buttons">
                        <div class="window-close" onclick="v8WindowManager.closeWindow('${config.id}')">✕</div>
                    </div>
                </div>
                <div class="window-content" id="content-${config.id}">
                    <div style="text-align:center; padding:20px;">⏳ جاري التحميل...</div>
                </div>
            </div>
        `;
        
        document.getElementById('windowsContainer').insertAdjacentHTML('beforeend', winHtml);
        config.element = document.getElementById(config.id);
        config.contentElement = document.getElementById(`content-${config.id}`);
        
        // عرض محتوى التطبيق
        if (config.instance && config.instance.render) {
            const html = config.instance.render();
            if (html) config.contentElement.innerHTML = html;
            if (config.instance.bindEvents) {
                setTimeout(() => config.instance.bindEvents(), 50);
            }
        }
        
        this.bringToFront(config.id);
    }
    
    updateWindowContent(windowId) {
        const config = this.windows.get(windowId);
        if (config && config.instance && config.instance.render && config.contentElement) {
            const html = config.instance.render();
            config.contentElement.innerHTML = html;
            if (config.instance.bindEvents) {
                setTimeout(() => config.instance.bindEvents(), 50);
            }
        }
    }
    
    bringToFront(windowId) {
        const config = this.windows.get(windowId);
        if (config) {
            config.zIndex = this.nextZIndex++;
            if (config.element) config.element.style.zIndex = config.zIndex;
        }
    }
    
    closeWindow(windowId) {
        const config = this.windows.get(windowId);
        if (!config) return;
        
        if (config.instance && config.instance.destroy) {
            config.instance.destroy();
        }
        
        if (config.element) config.element.remove();
        this.appRegistry.destroyInstance(config.appId, windowId);
        this.windows.delete(windowId);
        this.eventBus.emit('window:closed', { windowId, appId: config.appId });
    }
    
    startDrag(event, windowId) {
        event.preventDefault();
        const config = this.windows.get(windowId);
        if (!config || !config.element) return;
        
        this.bringToFront(windowId);
        
        const rect = config.element.getBoundingClientRect();
        const clientX = event.touches ? event.touches[0].clientX : event.clientX;
        const clientY = event.touches ? event.touches[0].clientY : event.clientY;
        const offsetX = clientX - rect.left;
        const offsetY = clientY - rect.top;
        
        this.activeDrag = { config, offsetX, offsetY };
        
        const onMove = (e) => {
            if (!this.activeDrag) return;
            e.preventDefault();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            let newX = cx - this.activeDrag.offsetX;
            let newY = cy - this.activeDrag.offsetY;
            
            newX = Math.max(0, Math.min(newX, window.innerWidth - config.element.offsetWidth));
            newY = Math.max(0, Math.min(newY, window.innerHeight - config.element.offsetHeight - 55));
            
            config.element.style.left = newX + 'px';
            config.element.style.top = newY + 'px';
            config.x = newX;
            config.y = newY;
        };
        
        const onStop = () => {
            this.activeDrag = null;
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onStop);
            document.removeEventListener('touchmove', onMove);
            document.removeEventListener('touchend', onStop);
        };
        
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onStop);
        document.addEventListener('touchmove', onMove);
        document.addEventListener('touchend', onStop);
    }
    
    getAllWindows() {
        return Array.from(this.windows.values());
    }
}

// ---------- 5. Internal Navigation Stack ----------
class V8NavigationStack {
    constructor(eventBus, windowManager) {
        this.eventBus = eventBus;
        this.windowManager = windowManager;
        this.history = [];
        this.currentIndex = -1;
    }
    
    push(state) {
        this.history = this.history.slice(0, this.currentIndex + 1);
        this.history.push(state);
        this.currentIndex++;
        this.eventBus.emit('navigation:changed', { canGoBack: this.canGoBack(), canGoForward: this.canGoForward() });
    }
    
    back() {
        if (this.canGoBack()) {
            this.currentIndex--;
            const state = this.history[this.currentIndex];
            this.eventBus.emit('navigation:back', state);
            return state;
        }
        return null;
    }
    
    forward() {
        if (this.canGoForward()) {
            this.currentIndex++;
            const state = this.history[this.currentIndex];
            this.eventBus.emit('navigation:forward', state);
            return state;
        }
        return null;
    }
    
    canGoBack() { return this.currentIndex > 0; }
    canGoForward() { return this.currentIndex < this.history.length - 1; }
    
    getCurrent() { return this.history[this.currentIndex]; }
}

// ---------- 6. تطبيقات النظام (Components) ----------

// 6.1 مفكرة
class NotesComponent {
    constructor(windowId, props) {
        this.windowId = windowId;
        this.props = props;
        this.content = localStorage.getItem('notes_content') || '';

            <div style="display:flex; flex-direction:column; gap:12px;">
                <textarea id="notes-${this.windowId}" style="width:100%; height:200px; padding:12px; border:1px solid #ddd; border-radius:16px;">${this.content}</textarea>
                <button id="save-${this.windowId}" style="padding:12px; background:linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; border-radius:12px;">💾 حفظ</button>
            </div>
        `;
    }
    
    bindEvents() {
        const saveBtn = document.getElementById(`save-${this.windowId}`);
        const textarea = document.getElementById(`notes-${this.windowId}`);
        
        if (saveBtn) {
            saveBtn.onclick = () => {
                this.content = textarea.value;

        // تنظيف

}

// 6.2 حاسبة
class CalculatorComponent {
    constructor(windowId, props) {
        this.windowId = windowId;
        this.value = '0';
        this.previousValue = 0;
        this.operator = null;
        this.waitingForOperand = false;
    }
    
    render() {
        return `
            <div>
                <input id="calc-display-${this.windowId}" type="text" readonly value="${this.value}" style="width:100%; padding:15px; font-size:28px; border:1px solid #ddd; border-radius:16px; margin-bottom:12px;">
                <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px;">
                    ${['7','8','9','/','4','5','6','*','1','2','3','-','0','.','=','+'].map(b => `
                        <button class="calc-btn-${this.windowId}" data-value="${b}" style="padding:12px; border:1px solid #ddd; border-radius:12px; background:#f5f5f5; cursor:pointer;">${b}</button>
                    `).join('')}
                    <button id="calc-clear-${this.windowId}" style="padding:12px; background:#dc3545; color:white; border:none; border-radius:12px; cursor:pointer;">C</button>
                </div>
            </div>
        `;
    }
    
    bindEvents() {
        const btns = document.querySelectorAll(`.calc-btn-${this.windowId}`);
        btns.forEach(btn => {
            btn.onclick = () => this.handleInput(btn.getAttribute('data-value'));
        });
        
        const clearBtn = document.getElementById(`calc-clear-${this.windowId}`);
        if (clearBtn) clearBtn.onclick = () => this.clear();
    }
    
    handleInput(val) {
        const display = document.getElementById(`calc-display-${this.windowId}`);
        if (val >= '0' && val <= '9') {
            if (this.waitingForOperand) {
                this.value = val;
                this.waitingForOperand = false;
            } else {
                this.value = this.value === '0' ? val : this.value + val;
            }
        } else if (val === '.') {
            if (!this.value.includes('.')) this.value += '.';
        } else if (val === '+' || val === '-' || val === '*' || val === '/') {
            const current = parseFloat(this.value);
            if (this.operator && !this.waitingForOperand) {
                this.calculate();
            }
            this.previousValue = parseFloat(this.value);
            this.operator = val;
            this.waitingForOperand = true;
        } else if (val === '=') {
            this.calculate();
            this.operator = null;
            this.waitingForOperand = true;
        }
        
        if (display) display.value = this.value;
    }
    
    calculate() {
        const current = parseFloat(this.value);
        let result = 0;
        switch (this.operator) {
            case '+': result = this.previousValue + current; break;
            case '-': result = this.previousValue - current; break;
            case '*': result = this.previousValue * current; break;
            case '/': result = this.previousValue / current; break;
            default: return;
        }
        this.value = result.toString();
        if (this.value === 'Infinity') this.value = 'خطأ';
        if (this.value === 'NaN') this.value = '0';
    }
    
    clear() {
        this.value = '0';
        this.previousValue = 0;
        this.operator = null;
        this.waitingForOperand = false;
        const display = document.getElementById(`calc-display-${this.windowId}`);
        if (display) display.value = this.value;
    }
    
    destroy() {}
}

// 6.3 إعدادات
class SettingsComponent {
    constructor(windowId, props) {
        this.windowId = windowId;
    }
    
    render() {
        const totalSize = this.calculateStorageSize();
        return `
            <div>
                <div style="margin:15px 0;">⚙️ إعدادات V8.3</div>
                <div style="margin:15px 0;">💾 التخزين: ${totalSize} MB</div>
                <div style="margin:15px 0;">🎨 الوضع: ${document.body.classList.contains('light-mode') ? 'نهار ☀️' : 'ليل 🌙'}</div>
                <button id="clear-data-${this.windowId}" style="width:100%; padding:14px; background:#dc3545; color:white; border:none; border-radius:16px; margin-top:15px;">🗑️ مسح جميع البيانات</button>
                <button id="close-all-${this.windowId}" style="width:100%; padding:14px; background:#667eea; color:white; border:none; border-radius:16px; margin-top:10px;">❌ إغلاق جميع النوافذ</button>
            </div>
        `;
    }
    
    calculateStorageSize() {
        let total = 0;
        for(let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            total += (key.length + (localStorage.getItem(key) || '').length) * 2;
        }
        return (total / 1048576).toFixed(2);
    }
    
    bindEvents() {
        const clearBtn = document.getElementById(`clear-data-${this.windowId}`);
        if (clearBtn) {
            clearBtn.onclick = () => {
                if (confirm('مسح جميع البيانات؟')) {
                    localStorage.clear();
                    v8.eventBus.emit('notification', { message: '✅ تم مسح البيانات', type: 'success' });
                    setTimeout(() => location.reload(), 1000);
                }
            };
        }
        
        const closeAllBtn = document.getElementById(`close-all-${this.windowId}`);
        if (closeAllBtn) {
            closeAllBtn.onclick = () => {
                const windows = v8.windowManager.getAllWindows();
                windows.forEach(win => v8.windowManager.closeWindow(win.id));
                v8.eventBus.emit('notification', { message: '✅ تم إغلاق جميع النوافذ', type: 'success' });
            };
        }
    }
    
    destroy() {}
}

// ---------- 7. UI Renderer (View Only) ----------
class V8UIRenderer {
    constructor(appRegistry, windowManager, eventBus) {
        this.appRegistry = appRegistry;
        this.windowManager = windowManager;
        this.eventBus = eventBus;
    }
    
    renderDesktopIcons() {
        const container = document.getElementById('desktopIcons');
        const apps = this.appRegistry.getAllApps();
        
        container.innerHTML = apps.map(app => `
            <div class="desktop-icon" data-app-id="${app.id}">
                <div class="icon">${app.icon}</div>
                <div class="label">${app.name}</div>
            </div>
        `).join('');
        
        // ربط الأحداث
        document.querySelectorAll('.desktop-icon').forEach(icon => {
            icon.onclick = () => {
                const appId = icon.getAttribute('data-app-id');
                this.windowManager.createWindow(appId);
                this.eventBus.emit('notification', { message: `🚀 فتح ${appId}`, type: 'info' });
            };
        });
    }
    
    updateClock() {
        const update = () => {
            const now = new Date();
            document.getElementById('clock').innerHTML = now.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
        };
        update();
        setInterval(update, 1000);
    }
    
    initBattery() {
        if ('getBattery' in navigator) {
            navigator.getBattery().then(battery => {
                const update = () => {
                    const level = Math.round(battery.level * 100);
                    document.getElementById('batteryStatus').innerHTML = battery.charging ? `⚡ ${level}%` : `🔋 ${level}%`;
                };
                update();
                battery.addEventListener('levelchange', update);
                battery.addEventListener('chargingchange', update);
            });
        }
    }
    
    initNetwork() {
        const update = () => {
            document.getElementById('networkStatus').innerHTML = navigator.onLine ? '📶 Online' : '📡 Offline';
        };
        update();
        window.addEventListener('online', update);
        window.addEventListener('offline', update);
    }
    
    initTheme() {
        const btn = document.getElementById('themeToggle');
        btn.onclick = () => {
            document.body.classList.toggle('light-mode');
            btn.innerHTML = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
            this.eventBus.emit('notification', { message: document.body.classList.contains('light-mode') ? '✅ وضع النهار' : '✅ وضع الليل', type: 'success' });
        };
    }
    
    initStartMenu() {
        document.getElementById('startMenu').onclick = () => {
            this.eventBus.emit('notification', { message: '☁️ V8.3 Cloud OS - Unified Kernel', type: 'info' });
        };
    }
    
    initNavigation() {
        document.getElementById('navBack').onclick = () => {
            if (v8.navigation.canGoBack()) {
                v8.navigation.back();
                this.eventBus.emit('notification', { message: '◀ رجوع', type: 'info' });
            } else {
                this.eventBus.emit('notification', { message: 'لا توجد صفحة سابقة', type: 'warning' });
            }
        };
        
        document.getElementById('navForward').onclick = () => {
            if (v8.navigation.canGoForward()) {
                v8.navigation.forward();
                this.eventBus.emit('notification', { message: 'تقدم ▶', type: 'info' });
            } else {
                this.eventBus.emit('notification', { message: 'لا توجد صفحة تالية', type: 'warning' });
            }
        };
        
        document.getElementById('navRefresh').onclick = () => {
            location.reload();
        };
    }
    
    initNotifications() {
        this.eventBus.on('notification', (data) => {
            this.showNotification(data.message, data.type);
        });
    }
    
    showNotification(message, type = 'info') {
        const colors = {
            success: '#28a745', error: '#dc3545', warning: '#ffc107', info: '#667eea'
        };
        const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
        
        const n = document.createElement('div');
        n.className = 'notification';
        n.innerHTML = `${icons[type]} ${message}`;
        n.style.borderRight = `4px solid ${colors[type]}`;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 2500);
    }
}

// ---------- 8. Kernel Initialization ----------
const v8 = {
    eventBus: new V8EventBus(),
    appRegistry: null,
    windowManager: null,
    navigation: null,
    storage: null,
    ui: null
};

async function initV8() {
    console.log('🚀 V8.3 Unified Kernel initializing...');
    
    // تهيئة التخزين
    v8.storage = new V8Storage();
    await v8.storage.init();
    
    // تهيئة المكونات الأساسية
    v8.appRegistry = new V8AppRegistry(v8.eventBus);
    v8.windowManager = new V8WindowManager(v8.eventBus, v8.appRegistry);
    v8.navigation = new V8NavigationStack(v8.eventBus, v8.windowManager);
    v8.ui = new V8UIRenderer(v8.appRegistry, v8.windowManager, v8.eventBus);
    
    // تسجيل التطبيقات
    v8.appRegistry.register('notes', {
        name: '📝 مفكرة',
        icon: '📝',
        component: NotesComponent
    });
    
    v8.appRegistry.register('calculator', {
        name: '🔢 حاسبة',
        icon: '🔢',
        component: CalculatorComponent
    });
    
    v8.appRegistry.register('settings', {
        name: '⚙️ إعدادات',
        icon: '⚙️',
        component: SettingsComponent
    });
    
    // تهيئة واجهة المستخدم
    v8.ui.renderDesktopIcons();
    v8.ui.updateClock();
    v8.ui.initBattery();
    v8.ui.initNetwork();
    v8.ui.initTheme();
    v8.ui.initStartMenu();
    v8.ui.initNavigation();
    v8.ui.initNotifications();
    
    // ربط الـ window manager للوصول العالمي
    window.v8WindowManager = v8.windowManager;
    
    v8.eventBus.emit('notification', { message: '✨ V8.3 Unified Kernel جاهز', type: 'success' });
    console.log('%c✅ V8.3 Unified Kernel Ready', 'color: #28a745; font-size: 14px; font-weight: bold;');
    
    return v8;
}

// تشغيل النظام
initV8();

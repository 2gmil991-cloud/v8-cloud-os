<!DOCTYPE html>
<html>
<head><title>V8 Cloud OS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.box{background:white;padding:30px;border-radius:20px;width:300px;text-align:center}
input{width:100%;padding:10px;margin:10px 0;border:1px solid #ddd;border-radius:10px}
button{width:100%;padding:10px;background:#667eea;color:white;border:none;border-radius:10px;cursor:pointer}
.switch{color:#667eea;margin-top:10px;cursor:pointer}
.hidden{display:none}
</style>
</head>
<body>
<div id="loginBox">
<div class="box">
<h1>☁️ V8 Cloud OS</h1>
<div id="loginForm">
<input type="email" id="loginEmail" placeholder="البريد">
<input type="password" id="loginPassword" placeholder="كلمة المرور">
<button onclick="login()">دخول</button>
<div class="switch" onclick="showRegisterForm()">إنشاء حساب جديد</div>
</div>
<div id="registerForm" class="hidden">
<input type="email" id="regEmail" placeholder="البريد">
<input type="password" id="regPassword" placeholder="كلمة المرور">
<button onclick="register()">تسجيل</button>
<div class="switch" onclick="showLoginForm()">عودة لتسجيل الدخول</div>
</div>
</div>
</div>
<script>
// التصحيح الأول: التأكد من تحميل supabase بشكل صحيح
window.onload = function() {
    if (typeof supabaseJs === 'undefined') {
        alert('خطأ: لم يتم تحميل Supabase SDK. تأكد من اتصال الإنترنت.');
        return;
    }
    window.supabase = supabaseJs.createClient(
        'https://rbgphnexmnmjwtgabrgr.supabase.co',
        'sb_publishable_wAzalDnP8M3hwSAU8kgJeQ_pwBM30VY'
    );
    console.log('✅ Supabase initialized');
};

// تعريف الدوال بشكل عام (global)
window.showRegisterForm = function() {
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('registerForm').classList.remove('hidden');
};

window.showLoginForm = function() {
    document.getElementById('registerForm').classList.add('hidden');
    document.getElementById('loginForm').classList.remove('hidden');
};

window.login = async function() {
    if (!window.supabase) { alert('جاري تحميل الخدمة، حاول مرة أخرى'); return; }
    let email = document.getElementById('loginEmail').value;
    let password = document.getElementById('loginPassword').value;
    if (!email || !password) { alert('الرجاء إدخال البريد وكلمة المرور'); return; }
    let { error } = await window.supabase.auth.signInWithPassword({ email, password });
    if(error) { alert('خطأ: '+error.message); return; }
    alert('✅ تم الدخول بنجاح');
};

window.register = async function() {
    if (!window.supabase) { alert('جاري تحميل الخدمة، حاول مرة أخرى'); return; }
    let email = document.getElementById('regEmail').value;
    let password = document.getElementById('regPassword').value;
    if (!email || !password) { alert('الرجاء إدخال البريد وكلمة المرور'); return; }
    let { error } = await window.supabase.auth.signUp({ email, password });
    if(error) { alert('خطأ: '+error.message); return; }
    alert('✅ تم التسجيل بنجاح');
    window.showLoginForm();
};
</script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>V8 Cloud OS | الإصدار 8.1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
        }
        /* وضع الليل/النهار */
        body.light-mode {
            background: linear-gradient(135deg, #e0e0e0 0%, #f5f5f5 100%);
        }
        body.light-mode .taskbar {
            background: rgba(255,255,255,0.9);
            color: #333;
        }
        body.light-mode .desktop-icon {
            background: rgba(255,255,255,0.7);
            color: #333;
        }
        body.light-mode .desktop-icon .label {
            color: #333;
        }
        body.light-mode .window {
            background: rgba(255,255,255,0.98);
        }
        body.light-mode .notification {
            background: #333;
            color: white;
        }
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 55px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            z-index: 1000;
        }
        .taskbar-left {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .start-menu {
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
        }
        .theme-toggle {
            background: rgba(255,255,255,0.15);
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
        }
        .taskbar-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .battery-status, .network-status {
            font-size: 14px;
        }
        .desktop-icons {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .desktop-icon {
            width: 85px;
            text-align: center;
            cursor: pointer;
            padding: 10px;
            border-radius: 16px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            transition: all 0.2s;
        }
        .desktop-icon:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }
        .desktop-icon .icon {
            font-size: 42px;
        }
        .desktop-icon .label {
            color: white;
            font-size: 11px;
            margin-top: 5px;
        }
        .window {
            position: absolute;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 85%;
            max-width: 450px;
            min-height: 400px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
        }
        .window-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 14px;
            border-radius: 20px 20px 0 0;
            color: white;
            cursor: move;
            display: flex;
            justify-content: space-between;
        }
        .window-content {
            padding: 20px;
            flex: 1;
            overflow: auto;
            min-height: 300px;
        }
        .window-close {
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 3000;
            font-size: 14px;
            text-align: center;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        /* تقويم */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
            margin-top: 10px;
        }
        .calendar-day {
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
        }
        .calendar-day:hover {
            background: #667eea;
            color: white;
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        /* قائمة المهام */
        .task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .task-item input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .task-item.completed span {
            text-decoration: line-through;
            color: #999;
        }
        /* حاسبة محسنة */
        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .calc-btn {
            padding: 15px;
            font-size: 20px;
            border: 1px solid #ddd;
            border-radius: 12px;
            background: #f5f5f5;
            cursor: pointer;
            transition: all 0.2s;
        }
        .calc-btn:hover {
            background: #667eea;
            color: white;
        }
        .calc-btn.operator {
            background: #667eea;
            color: white;
        }
        .calc-btn.equals {
            background: #28a745;
            color: white;
        }
        .calc-btn.clear {
            background: #dc3545;
            color: white;
        }
        @media (max-width: 600px) {
            .desktop-icon { width: 70px; }
            .desktop-icon .icon { font-size: 36px; }
            .window { width: 92%; }
        }
    </style>
</head>
<body>

<div class="taskbar">
    <div class="taskbar-left">
        <div class="start-menu" onclick="showNotification('☁️ V8 Cloud OS v8.1')">☁️ V8</div>
        <div class="theme-toggle" onclick="toggleTheme()">🌙</div>
    </div>
    <div class="taskbar-right">
        <div class="battery-status" id="batteryStatus">🔋 --%</div>
        <div class="network-status" id="networkStatus">📶 Online</div>
        <div id="clock"></div>
    </div>
</div>

<div class="desktop-icons" id="desktopIcons"></div>
<div id="windowsContainer"></div>

<script>
    // ========== الإشعارات ==========
    function showNotification(msg, type = 'info') {
        let n = document.createElement('div');
        n.className = 'notification';
        n.textContent = msg;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 2500);
    }

    // ========== الساعة ==========
    function updateClock() {
        let now = new Date();
        document.getElementById('clock').innerHTML = now.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ========== حالة البطارية ==========
    if ('getBattery' in navigator) {
        navigator.getBattery().then(battery => {
            function updateBattery() {
                let level = Math.round(battery.level * 100);
                document.getElementById('batteryStatus').innerHTML = battery.charging ? `⚡ ${level}%` : `🔋 ${level}%`;
            }
            updateBattery();
            battery.addEventListener('levelchange', updateBattery);
            battery.addEventListener('chargingchange', updateBattery);
        });
    } else {
        document.getElementById('batteryStatus').innerHTML = '🔋 --%';
    }

    // ========== حالة الشبكة ==========
    function updateNetwork() {
        document.getElementById('networkStatus').innerHTML = navigator.onLine ? '📶 Online' : '📡 Offline';
    }
    updateNetwork();
    window.addEventListener('online', updateNetwork);
    window.addEventListener('offline', updateNetwork);

    // ========== تبديل الوضع ==========
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        let themeBtn = document.querySelector('.theme-toggle');
        if (document.body.classList.contains('light-mode')) {
            themeBtn.innerHTML = '☀️';
            showNotification('✅ وضع النهار');
        } else {
            themeBtn.innerHTML = '🌙';
            showNotification('✅ وضع الليل');
        }
    }

    // ========== التطبيقات ==========
    let apps = [
        { name: 'notes', display: '📝 مفكرة', icon: '📝' },
        { name: 'calculator', display: '🔢 حاسبة', icon: '🔢' },
        { name: 'files', display: '📁 ملفات', icon: '📁' },
        { name: 'calendar', display: '📅 تقويم', icon: '📅' },
        { name: 'tasks', display: '✅ مهام', icon: '✅' },
        { name: 'settings', display: '⚙️ إعدادات', icon: '⚙️' }
    ];

    function loadDesktopIcons() {
        let container = document.getElementById('desktopIcons');
        container.innerHTML = apps.map(app => `
            <div class="desktop-icon" onclick="openApp('${app.name}')">
                <div class="icon">${app.icon}</div>
                <div class="label">${app.display}</div>
            </div>
        `).join('');
    }

    let windows = [];
    let nextZ = 100;

    function openApp(appName) {
        let winId = Date.now();
        let winHtml = `
            <div id="win-${winId}" class="window" style="left:${50 + windows.length * 30}px; top:${100 + windows.length * 20}px; z-index:${nextZ++}">
                <div class="window-header" onmousedown="startDrag(event, 'win-${winId}')">
                    <span>${apps.find(a=>a.name===appName)?.display || appName}</span>
                    <div class="window-close" onclick="closeWindow('win-${winId}')">✕</div>
                </div>
                <div class="window-content" id="content-${winId}">
                    <div style="text-align:center; padding:20px;">⏳ جاري التحميل...</div>
                </div>
            </div>
        `;
        document.getElementById('windowsContainer').insertAdjacentHTML('beforeend', winHtml);
        let content = document.getElementById(`content-${winId}`);
        renderApp(content, appName);
        windows.push({ id: `win-${winId}`, element: document.getElementById(`win-${winId}`) });
    }

    // حاسبة آمنة (بدون eval)
    let calcValue = '0';
    let calcOperator = null;
    let waitingForOperand = false;

    function updateCalculatorDisplay() {
        let display = document.getElementById('calc-display');
        if (display) display.value = calcValue;
    }

    function inputDigit(digit) {
        if (waitingForOperand) {
            calcValue = digit;
            waitingForOperand = false;
        } else {
            calcValue = calcValue === '0' ? digit : calcValue + digit;
        }
        updateCalculatorDisplay();
    }

    function inputDecimal() {
        if (waitingForOperand) {
            calcValue = '0.';
            waitingForOperand = false;
        } else if (!calcValue.includes('.')) {
            calcValue += '.';
        }
        updateCalculatorDisplay();
    }

    function performOperation(nextOperator) {
        let inputValue = parseFloat(calcValue);
        if (calcOperator && !waitingForOperand) {
            let result = 0;
            switch (calcOperator) {
                case '+': result = calcPreviousValue + inputValue; break;
                case '-': result = calcPreviousValue - inputValue; break;
                case '*': result = calcPreviousValue * inputValue; break;
                case '/': result = calcPreviousValue / inputValue; break;
                default: result = inputValue;
            }
            calcValue = String(result);
            updateCalculatorDisplay();
        }
        calcPreviousValue = parseFloat(calcValue);
        calcOperator = nextOperator;
        waitingForOperand = true;
    }

    function clearCalculator() {
        calcValue = '0';
        calcOperator = null;
        waitingForOperand = false;
        updateCalculatorDisplay();
    }

    let calcPreviousValue = 0;

    function renderApp(container, appName) {
        if (appName === 'notes') {
            let saved = localStorage.getItem('notes_content') || '';
            container.innerHTML = `
                <textarea id="notes-area" style="width:100%; height:200px; padding:12px; border:1px solid #ddd; border-radius:16px; font-family:inherit;">${saved}</textarea>
                <button onclick="saveNotes()" style="width:100%; margin-top:12px; padding:12px; background:linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; border-radius:16px;">💾 حفظ</button>
                <div style="margin-top:10px; font-size:12px; color:#999;">آخر حفظ: ${localStorage.getItem('notes_last_saved') || 'لم يتم حفظ أي شيء'}</div>
            `;
            window.saveNotes = () => {
                let content = document.getElementById('notes-area').value;
                localStorage.setItem('notes_content', content);
                localStorage.setItem('notes_last_saved', new Date().toLocaleString('ar-EG'));
                showNotification('✅ تم حفظ الملاحظات');
            };
        }
        else if (appName === 'calculator') {
            container.innerHTML = `
                <input type="text" id="calc-display" readonly value="0" style="width:100%; padding:15px; font-size:32px; text-align:left; border:1px solid #ddd; border-radius:16px;">
                <div class="calc-buttons">
                    <button class="calc-btn" onclick="inputDigit('7')">7</button>
                    <button class="calc-btn" onclick="inputDigit('8')">8</button>
                    <button class="calc-btn" onclick="inputDigit('9')">9</button>
                    <button class="calc-btn operator" onclick="performOperation('/')">÷</button>
                    <button class="calc-btn" onclick="inputDigit('4')">4</button>
                    <button class="calc-btn" onclick="inputDigit('5')">5</button>
                    <button class="calc-btn" onclick="inputDigit('6')">6</button>
                    <button class="calc-btn operator" onclick="performOperation('*')">×</button>
                    <button class="calc-btn" onclick="inputDigit('1')">1</button>
                    <button class="calc-btn" onclick="inputDigit('2')">2</button>
                    <button class="calc-btn" onclick="inputDigit('3')">3</button>
                    <button class="calc-btn operator" onclick="performOperation('-')">−</button>
                    <button class="calc-btn" onclick="inputDigit('0')">0</button>
                    <button class="calc-btn" onclick="inputDecimal()">.</button>
                    <button class="calc-btn equals" onclick="performOperation('=')">=</button>
                    <button class="calc-btn operator" onclick="performOperation('+')">+</button>
                    <button class="calc-btn clear" onclick="clearCalculator()">C</button>
                </div>
            `;
            updateCalculatorDisplay();
        }
        else if (appName === 'files') {
            let files = JSON.parse(localStorage.getItem('user_files') || '[]');
            container.innerHTML = `
                <button onclick="addFile()" style="width:100%; padding:12px; background:#28a745; color:white; border:none; border-radius:16px; margin-bottom:12px;">➕ ملف جديد</button>
                <div style="border:1px solid #ddd; border-radius:16px; padding:12px; max-height:250px; overflow-y:auto;">
                    ${files.map((f, i) => `
                        <div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                            <span>📄 ${f.name}</span>
                            <button onclick="deleteFile(${i})" style="background:#dc3545; color:white; border:none; padding:5px 10px; border-radius:8px;">🗑️</button>
                        </div>
                    `).join('')}
                    ${files.length === 0 ? '<p style="color:#999; text-align:center;">لا توجد ملفات</p>' : ''}
                </div>
            `;
            window.addFile = () => {
                let name = prompt('اسم الملف:');
                if(name) {
                    let files = JSON.parse(localStorage.getItem('user_files') || '[]');
                    files.push({ name, created: new Date().toISOString(), content: '' });
                    localStorage.setItem('user_files', JSON.stringify(files));
                    openApp('files');
                    showNotification('✅ تم إنشاء الملف');
                }
            };
            window.deleteFile = (index) => {
                let files = JSON.parse(localStorage.getItem('user_files') || '[]');
                files.splice(index, 1);
                localStorage.setItem('user_files', JSON.stringify(files));
                openApp('files');
                showNotification('🗑️ تم حذف الملف');
            };
        }
        else if (appName === 'calendar') {
            let today = new Date();
            let currentMonth = today.getMonth();
            let currentYear = today.getFullYear();
            let currentDate = today.getDate();
            
            function getDaysInMonth(year, month) {
                return new Date(year, month + 1, 0).getDate();
            }
            function getFirstDayIndex(year, month) {
                return new Date(year, month, 1).getDay();
            }
            
            let daysInMonth = getDaysInMonth(currentYear, currentMonth);
            let firstDay = getFirstDayIndex(currentYear, currentMonth);
            let days = [];
            for(let i = 0; i < firstDay; i++) days.push(null);
            for(let i = 1; i <= daysInMonth; i++) days.push(i);
            
            container.innerHTML = `
                <div class="calendar-header">
                    <button onclick="prevMonth()" style="padding:5px 10px; border-radius:8px; border:1px solid #ddd;">◀</button>
                    <h3>${today.toLocaleDateString('ar-EG', { month: 'long', year: 'numeric' })}</h3>
                    <button onclick="nextMonth()" style="padding:5px 10px; border-radius:8px; border:1px solid #ddd;">▶</button>
                </div>
                <div class="calendar-grid">
                    ${['ح', 'ن', 'ث', 'ر', 'خ', 'ج', 'س'].map(d => `<div style="font-weight:bold; text-align:center;">${d}</div>`).join('')}
                    ${days.map(day => `<div class="calendar-day" style="${day === currentDate ? 'background:#667eea; color:white;' : ''}">${day || ''}</div>`).join('')}
                </div>
            `;
        }
        else if (appName === 'tasks') {
            let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
            container.innerHTML = `
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <input type="text" id="new-task" placeholder="مهمة جديدة..." style="flex:1; padding:10px; border:1px solid #ddd; border-radius:12px;">
                    <button onclick="addTask()" style="padding:10px 20px; background:#28a745; color:white; border:none; border-radius:12px;">➕ إضافة</button>
                </div>
                <div id="tasks-list">
                    ${tasks.map((task, i) => `
                        <div class="task-item ${task.completed ? 'completed' : ''}">
                            <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${i})">
                            <span style="flex:1;">${task.text}</span>
                            <button onclick="deleteTask(${i})" style="background:#dc3545; color:white; border:none; padding:5px 10px; border-radius:8px;">🗑️</button>
                        </div>
                    `).join('')}
                    ${tasks.length === 0 ? '<p style="color:#999; text-align:center;">لا توجد مهام</p>' : ''}
                </div>
            `;
            window.addTask = () => {
                let input = document.getElementById('new-task');
                if(input.value.trim()) {
                    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
                    tasks.push({ text: input.value, completed: false });
                    localStorage.setItem('tasks', JSON.stringify(tasks));
                    openApp('tasks');
                    showNotification('✅ تم إضافة المهمة');
                }
            };
            window.toggleTask = (index) => {
                let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
                tasks[index].completed = !tasks[index].completed;
                localStorage.setItem('tasks', JSON.stringify(tasks));
                openApp('tasks');
            };
            window.deleteTask = (index) => {
                let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
                tasks.splice(index, 1);
                localStorage.setItem('tasks', JSON.stringify(tasks));
                openApp('tasks');
                showNotification('🗑️ تم حذف المهمة');
            };
        }
        else if (appName === 'settings') {
            let totalSize = 0;
            for(let i = 0; i < localStorage.length; i++) {
                let key = localStorage.key(i);
                let val = localStorage.getItem(key);
                totalSize += (key.length + val.length) * 2;
            }
            let sizeMB = (totalSize / 1024 / 1024).toFixed(2);
            container.innerHTML = `
                <div>
                    <div style="margin:15px 0;">⚙️ الإعدادات</div>
                    <div style="margin:15px 0;">💾 التخزين: ${sizeMB} MB</div>
                    <div style="margin:15px 0;">🎨 الوضع: ${document.body.classList.contains('light-mode') ? 'نهار ☀️' : 'ليل 🌙'}</div>
                    <div style="margin:15px 0;">📱 الجهاز: ${/Mobi/.test(navigator.userAgent) ? 'جوال' : 'حاسوب'}</div>
                    <button onclick="clearAllData()" style="width:100%; padding:14px; background:#dc3545; color:white; border:none; border-radius:16px; margin-top:15px;">🗑️ مسح جميع البيانات</button>
                    <button onclick="exportData()" style="width:100%; padding:14px; background:#28a745; color:white; border:none; border-radius:16px; margin-top:10px;">📤 تصدير البيانات</button>
                </div>
            `;
            window.clearAllData = () => {
                if(confirm('هل أنت متأكد؟ سيتم مسح جميع البيانات')) {
                    localStorage.clear();
                    showNotification('✅ تم مسح جميع البيانات');
                    setTimeout(() => location.reload(), 1000);
                }
            };
            window.exportData = () => {
                let data = {};
                for(let i = 0; i < localStorage.length; i++) {
                    let key = localStorage.key(i);
                    data[key] = localStorage.getItem(key);
                }
                let blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
                let link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `v8_backup_${new Date().toISOString()}.json`;
                link.click();
                showNotification('✅ تم تصدير البيانات');
            };
        }
    }

    // ========== سحب النوافذ ==========
    function startDrag(event, winId) {
        let win = windows.find(w => w.id === winId);
        if(!win) return;
        let rect = win.element.getBoundingClientRect();
        let clientX = event.touches ? event.touches[0].clientX : event.clientX;
        let clientY = event.touches ? event.touches[0].clientY : event.clientY;
        let offsetX = clientX - rect.left;
        let offsetY = clientY - rect.top;
        
        function onMove(e) {
            let cx = e.touches ? e.touches[0].clientX : e.clientX;
            let cy = e.touches ? e.touches[0].clientY : e.clientY;
            win.element.style.left = (cx - offsetX) + 'px';
            win.element.style.top = (cy - offsetY) + 'px';
        }
        function onStop() {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onStop);
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onStop);
    }

    function closeWindow(winId) {
        let win = windows.find(w => w.id === winId);
        if(win) { win.element.remove(); windows = windows.filter(w => w.id !== winId); }
    }

    document.addEventListener('touchstart', (e) => {
        if(e.target.closest('.window-header')) {
            let header = e.target.closest('.window-header');
            let win = header.closest('.window');
            let winId = win.id;
            startDrag(e, winId);
        }
    });

    loadDesktopIcons();
    showNotification('✨ مرحباً بك في V8 Cloud OS v8.1');

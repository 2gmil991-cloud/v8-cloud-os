<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Pro Lab — شركة جميل الحطامي</title>

<style>
:root{
  --black:#0b0b0b;
  --dark:#1a1a1a;
  --gold:#d4af37;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Tahoma, Arial;
  background:var(--black);
  color:#fff;
}

header{
  background:#000;
  padding:15px;
  text-align:center;
  border-bottom:2px solid var(--gold);
}

header h1{
  margin:0;
  font-size:20px;
  color:var(--gold);
}

header p{
  margin:5px 0 0;
  font-size:13px;
  color:#ccc;
}

.toolbar{
  background:var(--dark);
  padding:8px;
  text-align:center;
  border-bottom:1px solid var(--gold);
}

button{
  background:var(--gold);
  border:none;
  padding:7px 14px;
  margin:3px;
  cursor:pointer;
  font-weight:bold;
  border-radius:4px;
}

button:hover{
  background:#ffd700;
}

.container{
  display:flex;
  height:calc(100vh - 140px);
}

.editor, .preview{
  width:50%;
  padding:10px;
}

textarea{
  width:100%;
  height:100%;
  background:#111;
  color:#fff;
  border:1px solid var(--gold);
  padding:10px;
  font-family:Consolas, monospace;
  font-size:14px;
  resize:none;
}

iframe{
  width:100%;
  height:100%;
  border:1px solid var(--gold);
  background:#fff;
}

footer{
  text-align:center;
  padding:8px;
  font-size:12px;
  background:#000;
  border-top:1px solid var(--gold);
}

@media(max-width:768px){
  .container{
    flex-direction:column;
  }
  .editor, .preview{
    width:100%;
    height:50%;
  }
}
</style>
</head>

<body>

<header>
  <h1>HTML Pro Lab</h1>
  <p>شركة جميل الحطامي تسويق و مبيعات للتسوق الاكتروني</p>
</header>

<div class="toolbar">
  <button onclick="run()">تشغيل</button>
  <button onclick="save()">حفظ</button>
  <button onclick="download()">تحميل HTML</button>
  <button onclick="resetEditor()">إعادة ضبط</button>
</div>

<div class="container">
  <div class="editor">
<textarea id="code"></textarea>
  </div>

  <div class="preview">
    <iframe id="result"></iframe>
  </div>
</div>

<footer>
© 2026 — بيئة تطوير محلية بدون إنترنت
</footer>

<script>
const defaultCode = `<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مشروع تجريبي</title>
<style>
body{
  font-family:Arial;
  background:#f4f4f4;
  padding:20px;
}
.card{
  background:#000;
  color:gold;
  padding:20px;
  border-radius:10px;
}
</style>
</head>
<body>

<div class="card">
<h2>مرحبًا أستاذ جميل 👋</h2>
<p>هذه بيئة تطوير احترافية تعمل بدون إنترنت</p>
</div>

</body>
</html>`;

const editor = document.getElementById("code");
const iframe = document.getElementById("result");

// تحميل الكود المحفوظ
editor.value = localStorage.getItem("html_code") || defaultCode;

function run(){
  iframe.srcdoc = editor.value;
}

function save(){
  localStorage.setItem("html_code", editor.value);
  alert("تم الحفظ محليًا ✅");
}

function download(){
  const blob = new Blob([editor.value], {type:"text/html"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "project.html";
  a.click();
}

function resetEditor(){
  if(confirm("هل تريد إعادة الضبط؟")){
    editor.value = defaultCode;
    run();
  }
}

// تشغيل مباشر أثناء الكتابة
editor.addEventListener("input", run);

// تشغيل أولي
run();
</script>

</body>
</html>
